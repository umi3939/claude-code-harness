name: Quality Check

on:
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly quality scan (Sunday 00:00 UTC)
    - cron: '0 0 * * 0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install ruff pytest
      - name: Ruff format check
        run: ruff format --check tools/ hooks/
      - name: Ruff lint
        run: ruff check tools/ hooks/
      - name: Run tests
        run: python -m pytest tools/ -x --tb=short -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install ruff
        run: pip install ruff
      - name: Security check (ruff S rules)
        run: ruff check --select S tools/ hooks/
